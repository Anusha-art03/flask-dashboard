<!DOCTYPE html>
<html>

<head>

    <style>

        *{
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: #0b1d51;
            color: white;
            padding: 30px;
            margin: 0;
        }

        header{
            text-align: center;
            margin-bottom: 30px;
        }

        header h1{
            color: #ff9800;
            font-size: 42px;
            margin-bottom: 10px;
        }

        header p{
            font-size: 18px;
            max-width: 800px;
            margin: auto;
            line-height: 1.6;
        }

        .container{
            max-width: 950px;
            margin: auto;
        }

        .card{
            background: white;
            color: black;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 0 15px rgba(0,0,0,0.25);
        }

        select{
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 2px solid #0b1d51;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button{
            background: #ff9800;
            color: white;
            border: none;
            padding: 14px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover{
            background: #e68900;
        }

        hr{
            margin: 25px 0;
        }

        h2{
            color: #0b1d51;
        }

        h3{
            color: #ff9800;
            margin-top: 20px;
        }

        a{
            display: block;
            margin: 10px 0;
            color: #0b1d51;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover{
            text-decoration: underline;
        }

        footer{
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            border-top: 2px solid #ff9800;
        }

        footer p{
            color: white;
        }

    </style>

</head>

function showResources() {

    let career = document.getElementById("career").value;

    let r = resources[career];

    let youtubeLinks = "";
    let courseLinks = "";
    let practiceLinks = "";


    r.youtube.forEach(item => {

        youtubeLinks += `
        <a href="${item[1]}" target="_blank">
            ${item[0]}
        </a>`;

    });


    r.course.forEach(item => {

        courseLinks += `
        <a href="${item[1]}" target="_blank">
            ${item[0]}
        </a>`;

    });


    r.practice.forEach(item => {

        practiceLinks += `
        <a href="${item[1]}" target="_blank">
            ${item[0]}
        </a>`;

    });


    document.getElementById("resources").innerHTML = `

        <hr>

        <h2>🚀 ${career}</h2>

        <h3>🎥 YouTube Resources</h3>
        ${youtubeLinks}


        <h3>📖 Free Courses</h3>
        ${courseLinks}


        <h3>💻 Practice Platforms</h3>
        ${practiceLinks}


        <h3>🗺️ Career Roadmap</h3>

        <p>
            ${r.roadmap}
        </p>

    `;

}
