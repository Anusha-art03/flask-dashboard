<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Career Guide</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='Css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>AI Career Guide</h1>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p style="color:#ff4d4d;">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <label style="display:flex;align-items:center;margin:10px 0;color:white;">
            <input
                type="checkbox"
                name="remember"
                style="width:auto;margin-right:8px;"
            >
            Remember Me
        </label>

        <button type="submit">Login</button>

    </form>

    <p>
        Don't have an account?
        <a href="{{ url_for('register') }}">Register</a>
    </p>

</div>

</body>
</html>
